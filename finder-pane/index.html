  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .description {
      font-size: 1.05rem;
      color: #555;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
    }

    .links a {
      color: #888;
      text-decoration: none;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }

    .links a:hover {
      color: #1a1a1a;
    }

    .links svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .back {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: #888;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back:hover {
      color: #1a1a1a;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
