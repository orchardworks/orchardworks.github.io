<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orchardworks</title>
  <meta name="description" content="Crafting software for the world, nurturing it beyond release.">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="canonical" href="https://orchardworks.dev/">

  <!-- OGP -->
  <meta property="og:title" content="Orchardworks">
  <meta property="og:description" content="Crafting software for the world, nurturing it beyond release.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://orchardworks.dev/">
  <meta property="og:image" content="https://orchardworks.dev/og.png">
  <meta property="og:site_name" content="Orchardworks">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@orchardworks26">
  <meta name="twitter:title" content="Orchardworks">
  <meta name="twitter:description" content="Crafting software for the world, nurturing it beyond release.">
  <meta name="twitter:image" content="https://orchardworks.dev/og.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: #555;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .projects {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .project {
      display: block;
      padding: 1.25rem 1.5rem;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .project:hover {
      border-color: #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .project-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .project-desc {
      font-size: 0.875rem;
      color: #666;
    }

    .links {
      display: flex;
      gap: 1.5rem;
    }

    .links a {
      color: #888;
      text-decoration: none;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }

    .links a:hover {
      color: #1a1a1a;
    }

    .links svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <main>
    <img src="icon.png" alt="Orchardworks" class="logo">
    <h1>Orchardworks</h1>
    <p class="tagline">Crafting software for the world, nurturing it beyond release.</p>

    <div class="projects">
      <a class="project" href="https://orchard-ops.com">
        <div class="project-name">Orchard Ops</div>
        <div class="project-desc">Manage and configure scheduled tasks on macOS.</div>
      </a>
      <a class="project" href="https://docs.flintdb.dev">
        <div class="project-name">FlintDB</div>
        <div class="project-desc">A modern local database built for analysis.</div>
      </a>
      <a class="project" href="/finder-pane/">
        <div class="project-name">Finder Pane</div>
        <div class="project-desc">A visual file browser pane for your terminal.</div>
      </a>
    </div>

    <div class="links">
      <a href="https://github.com/orchardworks" aria-label="GitHub">

      </a>
      <a href="https://bsky.app/profile/orchardworks.dev" aria-label="Bluesky">
        <svg viewBox="0 0 24 24"><path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.785 2.627 3.59 3.513 6.182 3.2-4.574.55-8.657 2.428-5.81 7.166 3.235 4.913 6.586.784 7.004-.872.418 1.656 1.725 5.785 7.004.872 2.849-4.738-1.236-6.615-5.81-7.167 2.592.314 5.397-.572 6.182-3.2C15.622 9.418 16 4.458 16 3.769c0-.69-.139-1.861-.902-2.204-.659-.3-1.664-.62-4.3 1.24C8.046 4.748 5.087 8.687 4 10.8h8z" transform="translate(4 1.5) scale(1.25)"/></svg>
      </a>
      <a href="https://x.com/orchardworks26" aria-label="X">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>
  </main>

  <footer>&copy; Orchardworks</footer>
</body>
</html>
