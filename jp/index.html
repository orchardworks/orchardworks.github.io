  <link rel="canonical" href="https://orchardworks.dev/jp/">

  <!-- OGP -->
  <meta property="og:title" content="Orchardworks Japan">
  <meta property="og:description" content="ソフトウェアで、ひとが育つきっかけを届けたい。Orchardworks Japanは、日本向けに丁寧に磨き込んだソフトウェアを提供します。">

  <meta name="twitter:title" content="Orchardworks Japan">
  <meta name="twitter:description" content="ソフトウェアで、ひとが育つきっかけを届けたい。Orchardworks Japanは、日本向けに丁寧に磨き込んだソフトウェアを提供します。">

  <link rel="alternate" hreflang="ja" href="https://orchardworks.dev/jp/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.75rem;
    }

    .tagline {
      font-size: 1rem;
      color: #555;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 3rem;
    }

    .projects {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .project {
      display: block;
      padding: 1.25rem 1.5rem;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .project:hover {
      border-color: #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .project-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .project-desc {
      font-size: 0.875rem;
      color: #666;
      line-height: 1.6;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .links a {
      color: #888;
      text-decoration: none;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }

    .links a:hover {
      color: #1a1a1a;
    }

    .links svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .back-link {
      font-size: 0.85rem;
      color: #999;
      text-decoration: none;
    }

    .back-link:hover {
      color: #1a1a1a;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <main>
    <img src="../icon-transparent.png" alt="Orchardworks Japan" class="logo">
    <h1>Orchardworks Japan</h1>
    <p class="tagline">ソフトウェアで、ひとが育つきっかけを届けたい。<br>Orchardworks Japanは、日本向けに丁寧に磨き込んだソフトウェアを提供します。</p>

    <div class="projects">
      <a class="project" href="/jp/pairtype/">
        <div class="project-name">pairtype (ペアタイプ)</div>
        <div class="project-desc">ふたりで呼吸を合わせて挑む、協力タイピングゲーム。</div>
      </a>
    </div>

    <div class="links">
      <a href="https://github.com/orchardworks" aria-label="GitHub">

      </a>

      <a href="https://x.com/orchardworks26" aria-label="X">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>

    <a href="/" class="back-link">← Orchardworks (English)</a>
  </main>

  <footer>&copy; Orchardworks Japan</footer>
</body>
</html>
